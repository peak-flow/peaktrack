name: Commit Activity Log

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COMMIT_LOG_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Log recent commits
        env:
          GH_TOKEN: ${{ secrets.COMMIT_LOG_TOKEN || secrets.GITHUB_TOKEN }}
          ORG: peak-flow
        run: python3 .github/scripts/log_commits.py

      - name: Commit and push log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update commit activity log [skip ci]"
            git push
          fi
