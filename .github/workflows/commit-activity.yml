name: Track Commit Activity

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  check-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Count commits in last 6 hours
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SINCE=$(date -u -d "6 hours ago" +%Y-%m-%dT%H:%M:%SZ)
          NOW_DISPLAY=$(date -u -d "$NOW" +"%Y-%m-%d %H:%M UTC")
          SINCE_DISPLAY=$(date -u -d "$SINCE" +"%Y-%m-%d %H:%M UTC")

          echo "Checking peak-flow/peaktrack from $SINCE to $NOW"

          COUNT=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/peak-flow/peaktrack/commits?since=${SINCE}&per_page=100" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data) if isinstance(data, list) else 0)")

          echo "Found $COUNT commits"

          # Ensure the file exists with a header
          if [ ! -f commit-activity.md ]; then
            cat > commit-activity.md << 'EOF'
          # GitHub Commit Activity

          Auto-generated every 6 hours. Tracks commits per repo in the preceding 6-hour window.

          EOF
          fi

          # Append new entry
          cat >> commit-activity.md << EOF

          ## ${NOW_DISPLAY}

          **Window:** ${SINCE_DISPLAY} → ${NOW_DISPLAY}
          **Total commits:** ${COUNT}

          | Repository | Commits |
          | --- | --- |
          | \`peak-flow/peaktrack\` | ${COUNT} |

          EOF

          echo "Appended entry to commit-activity.md"

      - name: Commit and push updated log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-activity.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update commit activity log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
