name: Commit Activity Report

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours at :00
  workflow_dispatch:         # allow manual trigger

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate commit activity report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: peak-flow
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          REPORT_FILE="commit-activity.md"

          echo "Checking commits since $SINCE"

          # Fetch all repos in the org (up to 100)
          REPOS=$(gh api "orgs/${ORG}/repos?per_page=100&sort=pushed" \
            --jq '.[].full_name')

          TOTAL=0
          BODY=""

          while IFS= read -r REPO; do
            COUNT=$(gh api "repos/${REPO}/commits?since=${SINCE}&per_page=100" \
              --jq 'length' 2>/dev/null || echo 0)

            if [ "$COUNT" -gt 0 ]; then
              BODY+="| \`${REPO}\` | ${COUNT} |\n"
              TOTAL=$((TOTAL + COUNT))
            fi
          done <<< "$REPOS"

          # Build the markdown report
          {
            echo "# Commit Activity Report"
            echo ""
            echo "**Window:** last 6 hours  "
            echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "## Summary"
            echo ""
            echo "**Total commits:** ${TOTAL}"
            echo ""
            if [ -n "$BODY" ]; then
              echo "## Repos with activity"
              echo ""
              echo "| Repository | Commits |"
              echo "|------------|---------|"
              printf "%b" "$BODY"
            else
              echo "_No commits in the last 6 hours._"
            fi
            echo ""
            echo "---"
            echo ""
            echo "<!-- auto-generated by commit-activity workflow -->"
          } > "$REPORT_FILE"

          cat "$REPORT_FILE"

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-activity.md
          if git diff --cached --quiet; then
            echo "No changes to commit (no activity this window)."
          else
            git commit -m "chore: update commit activity report $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
