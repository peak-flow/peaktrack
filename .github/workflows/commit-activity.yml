name: Commit Activity Tracker

# Requires a repo secret named GH_PAT with scopes: repo, read:org
# Create it at: Settings → Secrets and variables → Actions → New repository secret
# Without GH_PAT, only public repos accessible to GITHUB_TOKEN will be counted.

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allows manual trigger from Actions tab

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate commit activity report
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ORG: peak-flow
        run: |
          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          WINDOW_START=$(date -u -d '6 hours ago' '+%Y-%m-%d %H:%M UTC')
          WINDOW_END=$(date -u '+%Y-%m-%d %H:%M UTC')
          REPORT="reports/commit-activity.md"
          HISTORY="reports/history.md"

          mkdir -p reports

          # ── Collect all repos in the org (paginated, 100/page) ──────────
          REPOS=()
          PAGE=1
          while true; do
            BATCH=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/$ORG/repos?per_page=100&page=$PAGE&type=all" \
              | jq -r '.[].name // empty')
            [ -z "$BATCH" ] && break
            while IFS= read -r name; do
              REPOS+=("$name")
            done <<< "$BATCH"
            PAGE=$((PAGE + 1))
          done

          echo "Scanning ${#REPOS[@]} repositories since $SINCE ..."

          # ── Fetch commit counts ──────────────────────────────────────────
          TMPDATA=$(mktemp)
          TOTAL=0

          for REPO in "${REPOS[@]}"; do
            HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$ORG/$REPO/commits?since=$SINCE&per_page=100")

            if [ "$HTTP" = "200" ]; then
              COUNT=$(jq 'if type == "array" then length else 0 end' /tmp/resp.json 2>/dev/null || echo 0)
              if [ "$COUNT" -gt 0 ]; then
                echo "$COUNT $REPO" >> "$TMPDATA"
                TOTAL=$((TOTAL + COUNT))
              fi
            fi
          done

          ACTIVE=$([ -s "$TMPDATA" ] && wc -l < "$TMPDATA" | tr -d ' ' || echo 0)

          # ── Write current-window report ──────────────────────────────────
          {
            echo "# Commit Activity Report"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Window** | \`$WINDOW_START\` → \`$WINDOW_END\` |"
            echo "| **Total commits** | **$TOTAL** |"
            echo "| **Active repos** | $ACTIVE of ${#REPOS[@]} |"
            echo ""
            if [ "$ACTIVE" -gt 0 ]; then
              echo "## Active Repositories"
              echo ""
              echo "| Repository | Commits |"
              echo "|------------|--------:|"
              sort -rn "$TMPDATA" | while IFS=' ' read -r COUNT REPO; do
                echo "| [$REPO](https://github.com/$ORG/$REPO) | $COUNT |"
              done
            else
              echo "*No commits were made in this 6-hour window.*"
            fi
            echo ""
            echo "---"
            echo "*Auto-generated by [commit-activity.yml](/.github/workflows/commit-activity.yml). Updated every 6 hours.*"
          } > "$REPORT"

          # ── Append one row to the history log ───────────────────────────
          if [ ! -f "$HISTORY" ]; then
            {
              echo "# Commit Activity History"
              echo ""
              echo "One row appended every 6 hours."
              echo ""
              echo "| Window End (UTC) | Total Commits | Active Repos |"
              echo "|---|:---:|:---:|"
            } > "$HISTORY"
          fi
          echo "| $WINDOW_END | $TOTAL | $ACTIVE |" >> "$HISTORY"

          rm -f "$TMPDATA"

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if ! git diff --cached --quiet; then
            git commit -m "chore: commit activity report $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
