name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # manual trigger

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/kind-pascal-x3qowt
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check commits in last 6 hours
        env:
          # Use ORG_PAT for full org access (incl. private repos).
          # Fall back to GITHUB_TOKEN which covers public repos only.
          GH_TOKEN: ${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          NOW_DISPLAY=$(date -u +'%Y-%m-%d %H:%M UTC')

          echo "Searching commits since $SINCE"

          # Collect all repo names (one per commit) via paginated search
          COMMITS_FILE=$(mktemp)
          PAGE=1

          while true; do
            RESPONSE=$(curl -sS \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.cloak-preview+json" \
              "https://api.github.com/search/commits?q=org:peak-flow+committer-date:>=${SINCE}&per_page=100&page=${PAGE}&sort=committer-date&order=desc")

            ITEM_COUNT=$(echo "$RESPONSE" | jq '.items | length')
            TOTAL_COUNT=$(echo "$RESPONSE" | jq '.total_count // 0')

            [ "$ITEM_COUNT" -eq 0 ] && break

            echo "$RESPONSE" | jq -r '.items[].repository.full_name' >> "$COMMITS_FILE"

            [ $((PAGE * 100)) -ge "$TOTAL_COUNT" ] && break
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(grep -c . "$COMMITS_FILE" || true)

          # Build the markdown section
          if [ "$TOTAL" -gt 0 ]; then
            REPO_COUNT=$(sort -u "$COMMITS_FILE" | wc -l)

            TABLE_HEADER="| Repository | Commits |\n|------------|---------|\n"
            TABLE_ROWS=$(sort "$COMMITS_FILE" | uniq -c | sort -rn \
              | awk '{printf "| %s | %s |\n", $2, $1}')

            SECTION=$(printf '## %s — 6h window\n\n**Total commits:** %s  \n**Repos with activity:** %s\n\n%s%s\n---\n' \
              "$NOW_DISPLAY" "$TOTAL" "$REPO_COUNT" "$TABLE_HEADER" "$TABLE_ROWS")
          else
            SECTION=$(printf '## %s — 6h window\n\n**Total commits:** 0  \n**Repos with activity:** 0\n\n*No commits in this window.*\n\n---\n' \
              "$NOW_DISPLAY")
          fi

          # Append to (or create) commit-log.md
          if [ -f commit-log.md ]; then
            printf '\n%s' "$SECTION" >> commit-log.md
          else
            printf '# Commit Activity Log\n\n%s' "$SECTION" > commit-log.md
          fi

          echo "TOTAL_COMMITS=$TOTAL" >> "$GITHUB_ENV"

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "chore: log commit activity [automated]"
            git push origin claude/kind-pascal-x3qowt
          fi
