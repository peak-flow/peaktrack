name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    env:
      # GH_PAT should be a Personal Access Token with `repo` scope (for private
      # repos) or `public_repo` scope (for public repos only). If not set, falls
      # back to GITHUB_TOKEN which can only see the current repository.
      GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
      ORG: peak-flow   # change to a GitHub username to track personal repos

    steps:
      - uses: actions/checkout@v4

      - name: Generate commit report
        run: python3 .github/scripts/track_commits.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-activity.md
          git diff --staged --quiet && echo "No new commits to record." || (
            git commit -m "chore: update commit activity report [skip ci]" &&
            git push
          )
