name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Count commits in last 6 hours
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: peak-flow
        run: |
          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')

          # List all repos in the org; falls back to this repo if permissions are limited
          REPOS=$(gh repo list "${ORG}" --limit 100 --json nameWithOwner \
            --jq '.[].nameWithOwner' 2>/dev/null \
            || echo "${ORG}/peaktrack")

          {
            echo ""
            echo "---"
            echo ""
            echo "## ${RUN_DATE}"
            echo ""
            echo "> Tracking window: \`${SINCE}\` → \`${NOW}\`"
            echo ""
            echo "| Repository | Commits |"
            echo "|---|---|"
          } >> commit-log.md

          TOTAL=0
          while IFS= read -r REPO; do
            # Sum commit counts across all pages
            COUNT=$(gh api "repos/${REPO}/commits?since=${SINCE}&per_page=100" \
              --paginate --jq 'length' 2>/dev/null \
              | awk '{s+=$1} END {print s+0}')
            echo "| \`${REPO}\` | ${COUNT} |" >> commit-log.md
            TOTAL=$((TOTAL + COUNT))
          done <<< "$REPOS"

          {
            echo ""
            echo "**Total across all repos: ${TOTAL} commits**"
          } >> commit-log.md

      - name: Push updated log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          git diff --staged --quiet || git commit -m "chore: commit activity log $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
