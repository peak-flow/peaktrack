name: 6-Hour Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch commits and update log
        env:
          # Prefer a PAT (GH_PAT secret) so private-repo commits are included.
          # Falls back to GITHUB_TOKEN which covers public repos only.
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/track_commits.py

      - name: Commit and push updated log
        run: |
          git config user.name  "Commit Tracker Bot"
          git config user.email "actions@github.com"
          git add commit-log.md
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: commit log $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
