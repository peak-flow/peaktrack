name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Count commits in last 6 hours
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "now=$NOW" >> "$GITHUB_OUTPUT"

          # Search commits across the org in the last 6 hours
          RESPONSE=$(gh api \
            "search/commits?q=org:peak-flow+committer-date:>=$SINCE&per_page=100&sort=committer-date&order=desc" \
            -H "Accept: application/vnd.github.cloak-preview+json")

          TOTAL=$(echo "$RESPONSE" | jq '.total_count')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Build per-repo counts as JSON: {"repo": count}
          REPO_COUNTS=$(echo "$RESPONSE" | jq -r '
            [.items[].repository.full_name] |
            group_by(.) |
            map({(.[0]): length}) |
            add // {}
          ')
          echo "repo_counts<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPO_COUNTS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Append to commit-activity.md
        run: |
          SINCE="${{ steps.commits.outputs.since }}"
          NOW="${{ steps.commits.outputs.now }}"
          TOTAL="${{ steps.commits.outputs.total }}"
          REPO_COUNTS='${{ steps.commits.outputs.repo_counts }}'

          # Build markdown entry
          {
            echo ""
            echo "## $NOW"
            echo ""
            echo "**Window:** $SINCE → $NOW"
            echo ""
            echo "**Total commits:** $TOTAL"
            echo ""
            if [ "$TOTAL" -gt 0 ]; then
              echo "| Repository | Commits |"
              echo "|-----------|---------|"
              echo "$REPO_COUNTS" | jq -r 'to_entries[] | "| \(.key) | \(.value) |"'
            else
              echo "_No commits in this window._"
            fi
          } >> commit-activity.md

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-activity.md
          git diff --cached --quiet || git commit -m "chore: commit activity snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
