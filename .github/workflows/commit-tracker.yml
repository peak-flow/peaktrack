name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual run from Actions tab

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Count commits across org (last 6 hours)
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: python3 scripts/track_commits.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-report.md
          git diff --staged --quiet || \
            git commit -m "chore: commit activity report $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
