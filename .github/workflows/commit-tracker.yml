name: Commit Tracker

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: '0 */6 * * *'
  workflow_dispatch: # allow manual runs for testing

permissions:
  contents: write # needed to commit the report back to the repo

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the bot can push back to the branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Track commits from the last 6 hours
        env:
          # If you want to track repos beyond this one, create a repo secret
          # called COMMIT_TRACKER_TOKEN containing a PAT with `repo` scope.
          # Without it the workflow only tracks peak-flow/peaktrack.
          GH_TOKEN: ${{ secrets.COMMIT_TRACKER_TOKEN || secrets.GITHUB_TOKEN }}
          COMMIT_TRACKER_TOKEN: ${{ secrets.COMMIT_TRACKER_TOKEN || '' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/track-commits.sh

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: commit report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
