name: Commit Activity Tracker

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours to look back (default 6)"
        required: false
        default: "6"

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: peak-flow
          HOURS: ${{ github.event.inputs.hours || '6' }}
        run: python scripts/check_commits.py

      - name: Commit report to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "chore: commit activity report $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
