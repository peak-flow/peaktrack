name: Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  track-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Count commits across all org repos (last 6h)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SINCE=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          ORG="peak-flow"
          OUTFILE="commit-tracker.md"

          echo "Checking commits from $SINCE to $NOW ..."

          # Fetch all repos in the org (paginated, up to 300)
          REPOS=$(gh api "orgs/$ORG/repos?per_page=100&page=1" --jq '.[].name' 2>/dev/null)
          REPOS+=$'\n'$(gh api "orgs/$ORG/repos?per_page=100&page=2" --jq '.[].name' 2>/dev/null || true)
          REPOS+=$'\n'$(gh api "orgs/$ORG/repos?per_page=100&page=3" --jq '.[].name' 2>/dev/null || true)

          TOTAL=0
          ROWS=""

          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue
            COUNT=$(gh api "repos/$ORG/$REPO/commits?since=${SINCE}&until=${NOW}&per_page=100" \
              --jq 'if type == "array" then length else 0 end' 2>/dev/null || echo "0")
            COUNT=$(echo "$COUNT" | tr -d '[:space:]')
            if [ "${COUNT:-0}" -gt 0 ] 2>/dev/null; then
              TOTAL=$((TOTAL + COUNT))
              ROWS="${ROWS}| \`$ORG/$REPO\` | $COUNT |\n"
            fi
          done <<< "$REPOS"

          # Build the entry
          {
            echo ""
            echo "## $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "**Period:** \`$SINCE\` → \`$NOW\`"
            echo ""
            if [ -n "$ROWS" ]; then
              echo "| Repository | Commits |"
              echo "|------------|---------|"
              printf "%b" "$ROWS"
            else
              echo "_No commits in any repository during this window._"
            fi
            echo ""
            echo "**Total across all repos:** $TOTAL commit(s)"
            echo ""
            echo "---"
          } >> "$OUTFILE"

          echo "Done. Total commits: $TOTAL"

      - name: Commit and push tracker update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-tracker.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: commit tracker update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
