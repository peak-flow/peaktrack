name: Commit Activity Tracker

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"   # every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:               # allow manual run from GitHub UI

permissions:
  contents: write   # needed to commit the report file

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/track_commits.py

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/report.md
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: commit activity report $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
