name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/kind-pascal-7t6986

      - name: Collect commits and update log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import subprocess, json, collections, datetime, os, re

          since = (datetime.datetime.utcnow() - datetime.timedelta(hours=6)).strftime('%Y-%m-%dT%H:%M:%SZ')
          now_label = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          # Paginate through search results
          items = []
          page = 1
          while True:
              r = subprocess.run(
                  ['gh', 'api', '-H', 'Accept: application/vnd.github+json',
                   f'/search/commits?q=org:peak-flow+committer-date:>{since}&per_page=100&page={page}&sort=committer-date&order=desc'],
                  capture_output=True, text=True
              )
              data = json.loads(r.stdout)
              batch = data.get('items', [])
              items.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          counts = collections.Counter()
          for item in items:
              repo = item.get('repository', {}).get('full_name', 'unknown')
              counts[repo] += 1

          total = sum(counts.values())
          repo_count = len(counts)

          if counts:
              rows = '\n'.join(f'| {repo} | {n} |' for repo, n in sorted(counts.items(), key=lambda x: -x[1]))
          else:
              rows = '| No commits in this window. | — |'

          new_section = f"""## {now_label} — commits in last 6 hours

| Repo | Commits |
|------|---------|
{rows}

**Total:** {total} commits across {repo_count} repos

---

"""

          with open('commit-log.md', 'r') as f:
              content = f.read()

          sep = '\n---\n'
          idx = content.find(sep)
          if idx != -1:
              updated = content[:idx + len(sep)] + '\n' + new_section + content[idx + len(sep):]
          else:
              updated = content + '\n' + new_section

          with open('commit-log.md', 'w') as f:
              f.write(updated)

          print(f'Done: {total} commits across {repo_count} repos in last 6h.')
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: commit activity log $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
