name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allows manual trigger from the Actions tab

jobs:
  track-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate commit report entry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # -------------------------------------------------------
          # Repos to track — add more "owner/repo" entries here
          # -------------------------------------------------------
          REPOS=(
            "peak-flow/peaktrack"
          )

          SINCE=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Create file with header if it doesn't exist yet
          if [ ! -f commit-report.md ]; then
            printf '# Commit Activity Log\n\n> Auto-updated every 6 hours.\n> Each entry counts commits from the preceding 6-hour window.\n\n---\n\n' > commit-report.md
          fi

          {
            echo "## Report — $NOW"
            echo ""
            echo "| Repository | Commits (last 6 h) |"
            echo "|------------|--------------------|"          } >> commit-report.md

          TOTAL=0
          for REPO in "${REPOS[@]}"; do
            COUNT=$(gh api "repos/$REPO/commits" \
              --paginate \
              -f since="$SINCE" \
              -f per_page=100 \
              --jq '.[].sha' 2>/dev/null | wc -l)
            echo "| \`$REPO\` | $COUNT |" >> commit-report.md
            TOTAL=$((TOTAL + COUNT))
          done

          {
            echo ""
            echo "**Total:** $TOTAL commits"
            echo ""
            echo "---"
            echo ""
          } >> commit-report.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}
          git add commit-report.md
          git diff --staged --quiet || \
            git commit -m "chore: commit activity report $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
