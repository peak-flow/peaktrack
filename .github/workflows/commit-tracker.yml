name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours at :00
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so git log --since works correctly

      - name: Count commits in last 6 hours and update log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          SINCE=$(date -u -d '6 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          LOG_FILE="commit_log.md"

          # Create file with header if it doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            cat > "$LOG_FILE" <<'EOF'
          # GitHub Commit Activity Log
          _Auto-updated every 6 hours_

          EOF
          fi

          # Fetch recent commits via GitHub API (covers all branches)
          COMMITS_JSON=$(gh api \
            "repos/${REPO}/commits?since=${SINCE}&per_page=100" \
            --jq '[.[] | {sha: .sha[0:7], author: (.commit.author.name // .author.login // "unknown"), message: (.commit.message | split("\n")[0] | .[0:80]), time: .commit.author.date}]')

          COUNT=$(echo "$COMMITS_JSON" | jq 'length')

          # Build the markdown table rows
          TABLE_ROWS=$(echo "$COMMITS_JSON" | jq -r '.[] | "| \(.sha) | \(.author) | \(.message) | \(.time) |"')

          # Append new section to the top of the log (after the header)
          SECTION=$(cat <<SECTION
          ## ${NOW}
          **Repo:** ${REPO}
          **Commits in last 6 hours:** ${COUNT}

          | SHA | Author | Message | Time |
          |-----|--------|---------|------|
          ${TABLE_ROWS:-| — | — | _No commits_ | — |}

          ---

          SECTION
          )

          # Insert section after the header (line 3 onward), preserving header
          HEADER=$(head -3 "$LOG_FILE")
          BODY=$(tail -n +4 "$LOG_FILE")
          printf '%s\n\n%s\n%s' "$HEADER" "$SECTION" "$BODY" > "$LOG_FILE"

      - name: Commit and push updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit_log.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update commit activity log [skip ci]"
            git push
          fi
