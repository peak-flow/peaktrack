name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allows manual runs from the Actions tab

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    env:
      # Use a GH_TOKEN secret (PAT with `repo` scope) for org-wide scanning.
      # Falls back to the built-in GITHUB_TOKEN, which only sees this repo.
      GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Collect commit activity
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          ORG="${GITHUB_REPOSITORY_OWNER}"

          # List repos in the org; fall back to the current repo if token lacks org scope
          if gh repo list "$ORG" --limit 100 --no-archived \
               --json nameWithOwner -q '.[].nameWithOwner' \
               > /tmp/repos.txt 2>/dev/null && [ -s /tmp/repos.txt ]; then
            echo "Scanning org: $ORG ($(wc -l < /tmp/repos.txt) repos)"
          else
            echo "${GITHUB_REPOSITORY}" > /tmp/repos.txt
            echo "Falling back to current repo only. Add a GH_TOKEN secret for org-wide scanning."
          fi

          TOTAL=0
          TABLE_ROWS=""

          while IFS= read -r repo; do
            RESPONSE=$(gh api "repos/${repo}/commits?since=${SINCE}&per_page=100" 2>/dev/null || echo "[]")
            COUNT=$(echo "$RESPONSE" | jq 'length')

            if [ "${COUNT:-0}" -gt 0 ]; then
              AUTHORS=$(echo "$RESPONSE" | jq -r '[.[].commit.author.name] | unique | join(", ")')
              TABLE_ROWS+="| \`${repo}\` | ${COUNT} | ${AUTHORS} |"$'\n'
              TOTAL=$((TOTAL + COUNT))
            fi
          done < /tmp/repos.txt

          # Create file with header on first run
          if [ ! -f COMMIT_ACTIVITY.md ]; then
            printf '# Commit Activity Log\n\n> Automatically updated every 6 hours by GitHub Actions.\n> Add a `GH_TOKEN` repository secret (PAT with `repo` scope) to scan the whole org.\n\n---\n\n' \
              > COMMIT_ACTIVITY.md
          fi

          # Append new entry
          {
            echo "## ${NOW}"
            echo ""
            if [ -n "$TABLE_ROWS" ]; then
              echo "| Repository | Commits (last 6h) | Authors |"
              echo "|---|---|---|"
              printf "%s" "$TABLE_ROWS"
              echo ""
              echo "_Total: **${TOTAL}** commits_"
            else
              echo "_No commits in the last 6 hours._"
            fi
            echo ""
            echo "---"
            echo ""
          } >> COMMIT_ACTIVITY.md

      - name: Push updated log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMMIT_ACTIVITY.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: commit activity log $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "${GITHUB_REF_NAME}"
          fi
