name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours at :00
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    env:
      # Space-separated list of "owner/repo" pairs to track.
      # Add more repos here (requires GH_PAT if they are outside this org).
      REPOS_TO_TRACK: >-
        peak-flow/peaktrack

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch commit activity and write report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          DATE_LABEL=$(date -u '+%Y-%m-%d %H:%M UTC')
          REPORT_FILE="reports/commit-activity.md"

          mkdir -p reports

          # --- build the new section ---
          {
            echo ""
            echo "## $DATE_LABEL"
            echo ""
            echo "| Repository | Commits (last 6 h) | Top Authors |"
            echo "|---|---|---|"

            TOTAL=0

            for REPO in $REPOS_TO_TRACK; do
              # Paginate through all commits since SINCE (up to 10 pages)
              PAGE=1
              COUNT=0
              AUTHORS=""

              while true; do
                RESPONSE=$(curl -sf \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/$REPO/commits?since=$SINCE&per_page=100&page=$PAGE" \
                  || echo "[]")

                BATCH_COUNT=$(echo "$RESPONSE" | jq 'length')
                if [ "$BATCH_COUNT" -eq 0 ]; then
                  break
                fi

                COUNT=$((COUNT + BATCH_COUNT))

                # Collect author logins
                BATCH_AUTHORS=$(echo "$RESPONSE" | jq -r '.[].author.login // .[].commit.author.name' | sort | uniq -c | sort -rn | head -3 | awk '{print $2"("$1")"}' | paste -sd ', ')
                if [ -n "$BATCH_AUTHORS" ]; then
                  AUTHORS="$AUTHORS $BATCH_AUTHORS"
                fi

                if [ "$BATCH_COUNT" -lt 100 ]; then
                  break
                fi
                PAGE=$((PAGE + 1))
                if [ "$PAGE" -gt 10 ]; then
                  break
                fi
              done

              TOTAL=$((TOTAL + COUNT))
              # Deduplicate author list
              AUTHOR_SUMMARY=$(echo "$AUTHORS" | tr ',' '\n' | tr ' ' '\n' | grep -v '^$' | sort | head -5 | paste -sd ', ' || echo "â€”")
              echo "| \`$REPO\` | $COUNT | $AUTHOR_SUMMARY |"
            done

            echo ""
            echo "**Total commits across all tracked repos:** $TOTAL"
            echo ""
            echo "---"
          } > /tmp/new_section.md

          # --- prepend to report file ---
          HEADER="# Commit Activity Report\n\n> Auto-generated every 6 hours by GitHub Actions.\n> Repos tracked: \`$REPOS_TO_TRACK\`\n"

          if [ ! -f "$REPORT_FILE" ]; then
            printf '%b' "$HEADER" > "$REPORT_FILE"
          fi

          # Insert new section just after the header (line 5 onward is content)
          # Simpler: append then sort by time (newest first via prepend)
          TMP=$(mktemp)
          printf '%b' "$HEADER" > "$TMP"
          cat /tmp/new_section.md >> "$TMP"
          # Keep existing content minus the header
          tail -n +5 "$REPORT_FILE" 2>/dev/null >> "$TMP" || true
          mv "$TMP" "$REPORT_FILE"

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/commit-activity.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: commit activity report $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
