name: 6-Hour Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/kind-pascal-6a2dik
          # ORG_READ_TOKEN needs org:read + repo scope for private repos.
          # Falls back to GITHUB_TOKEN (public repos only) if not set.
          token: ${{ secrets.ORG_READ_TOKEN || github.token }}

      - name: Fetch commits and update log
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN || github.token }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.parse, json, subprocess, os, sys
          from datetime import datetime, timedelta, timezone

          now_dt = datetime.now(timezone.utc)
          since_dt = now_dt - timedelta(hours=6)
          now_str   = now_dt.strftime("%Y-%m-%dT%H:%M:%SZ")
          since_str = since_dt.strftime("%Y-%m-%dT%H:%M:%SZ")

          token = os.environ["GH_TOKEN"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "peaktrack-commit-log/1.0",
          }

          def gh_search(page=1):
              q = urllib.parse.quote(f"org:peak-flow committer-date:>={since_str}")
              url = f"https://api.github.com/search/commits?q={q}&sort=committer-date&order=desc&per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          data = gh_search(1)
          total = data["total_count"]
          items = data["items"]
          if total > 100:
              data2 = gh_search(2)
              items += data2["items"]

          # Aggregate by repo
          repos = {}
          for item in items:
              repo = item["repository"]["full_name"]
              msg  = item["commit"]["message"].split("\n")[0][:90]
              if repo not in repos:
                  repos[repo] = {"count": 0, "latest": msg}
              repos[repo]["count"] += 1

          # Build markdown entry
          lines = [f"## {now_str} — window: {since_str} → {now_str} (UTC)", ""]
          lines.append(f"**Total commits: {total}**")
          lines.append("")
          if total == 0:
              lines.append("_No commits in this 6-hour window._")
          else:
              lines.append("| Repo | Commits | Latest message |")
              lines.append("|------|---------|----------------|")
              for repo, info in sorted(repos.items(), key=lambda x: -x[1]["count"]):
                  lines.append(f"| {repo} | {info['count']} | {info['latest']} |")
          lines.append("")
          lines.append("---")
          lines.append("")
          entry = "\n".join(lines)

          # Prepend after the first '---\n\n' block in the file
          log_path = "commit-log.md"
          with open(log_path) as f:
              content = f.read()

          marker = "---\n\n"
          idx = content.find(marker)
          if idx == -1:
              new_content = content + entry
          else:
              insert_at = idx + len(marker)
              new_content = content[:insert_at] + entry + content[insert_at:]

          with open(log_path, "w") as f:
              f.write(new_content)

          print(f"total={total}")
          print(f"window={since_str} -> {now_str}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          WINDOW=$(date -u -d "6 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore: commit log ${WINDOW} → $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push origin claude/kind-pascal-6a2dik
