name: Commit Tracker

on:
  schedule:
    # Every 6 hours: midnight, 06:00, noon, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use ORG_COMMIT_TOKEN (PAT with repo scope) to access private repos.
          # Falls back to GITHUB_TOKEN, which only sees public org repos.
          token: ${{ secrets.ORG_COMMIT_TOKEN || github.token }}

      - name: Track commits from last 6 hours
        env:
          GH_TOKEN: ${{ secrets.ORG_COMMIT_TOKEN || github.token }}
        run: python3 scripts/track_commits.py

      - name: Commit and push log
        run: |
          git config user.name "commit-tracker[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: commit activity log $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
