name: Commit Tracker

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back (default: 6)'
        required: false
        default: '6'
      github_org:
        description: 'Limit to a specific GitHub org/user (leave blank for all accessible repos)'
        required: false
        default: ''

jobs:
  track-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run commit tracker
        env:
          # Use a Personal Access Token with `repo` scope for cross-repo access.
          # Store it as a repository secret named GH_TOKEN.
          # If you only need this repo, GITHUB_TOKEN (auto-provided) is enough.
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          REPORT_DIR: commit-reports
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '6' }}
          GITHUB_ORG: ${{ github.event.inputs.github_org || '' }}
        run: python scripts/check_commits.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: commit activity report $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
