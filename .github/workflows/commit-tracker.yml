name: Commit Tracker

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'How many hours back to scan (default: 6)'
        required: false
        default: '6'

permissions:
  contents: write

jobs:
  count-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Count commits and update log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: peak-flow
          HOURS_BACK: ${{ github.event.inputs.hours_back || '6' }}
          COMMIT_LOG_FILE: COMMIT_LOG.md
        run: python scripts/count_commits.py

      - name: Commit and push log update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMMIT_LOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update commit log $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
