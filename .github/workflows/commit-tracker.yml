name: Commit Tracker (6h)

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Count commits in last 6 hours and update log
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ORG_OR_USER: peak-flow
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          WINDOW_LABEL=$(date -u '+%Y-%m-%d %H:%M UTC')

          echo "Checking commits since $SINCE"

          # Fetch all repos for the org/user (handles pagination)
          REPOS=$(gh api --paginate "/orgs/${ORG_OR_USER}/repos?type=all&per_page=100" \
            --jq '.[].full_name' 2>/dev/null \
            || gh api --paginate "/users/${ORG_OR_USER}/repos?type=all&per_page=100" \
            --jq '.[].full_name')

          TOTAL_COMMITS=0
          REPORT_LINES=""

          while IFS= read -r REPO; do
            COUNT=$(gh api \
              "/repos/${REPO}/commits?since=${SINCE}&per_page=100" \
              --jq 'length' 2>/dev/null || echo "0")

            if [ "$COUNT" -gt 0 ]; then
              REPORT_LINES="${REPORT_LINES}\n| \`${REPO}\` | ${COUNT} |"
              TOTAL_COMMITS=$((TOTAL_COMMITS + COUNT))
            fi
          done <<< "$REPOS"

          LOG_FILE="commit-log.md"

          # Create the file with a header if it doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            cat > "$LOG_FILE" <<'HEADER'
          # Commit Activity Log

          Auto-generated every 6 hours by the [Commit Tracker workflow](.github/workflows/commit-tracker.yml).

          ---

          HEADER
          fi

          # Prepend new entry at the top (after the header section)
          ENTRY="## ${WINDOW_LABEL} — ${TOTAL_COMMITS} commit(s)\n\n"
          if [ "$TOTAL_COMMITS" -gt 0 ]; then
            ENTRY="${ENTRY}| Repository | Commits |\n|---|---|\n${REPORT_LINES}\n"
          else
            ENTRY="${ENTRY}_No commits in this window._\n"
          fi

          # Insert after the "---" separator line
          TMPFILE=$(mktemp)
          awk -v entry="$(printf '%b' "$ENTRY")" \
            '/^---$/ && !inserted { print; print ""; printf "%s", entry; inserted=1; next } { print }' \
            "$LOG_FILE" > "$TMPFILE"
          mv "$TMPFILE" "$LOG_FILE"

          echo "--- Preview ---"
          head -30 "$LOG_FILE"

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update commit log $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
