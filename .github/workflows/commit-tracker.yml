name: Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:         # allow manual trigger from the Actions tab

permissions:
  contents: write

# ── Configure which repos to track ──────────────────────────────────────────
# Separate multiple repos with spaces: "owner/repo1 owner/repo2"
# For repos outside this repository you must add a Personal Access Token
# as a secret named COMMIT_TRACKER_TOKEN and replace GITHUB_TOKEN below.
env:
  REPOS: "peak-flow/peaktrack"

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate commit report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIX_HOURS_AGO=$(date -u -d "6 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          REPORT="commit-log.md"
          ENTRY=$(mktemp)

          printf "## %s\n\n" "$TIMESTAMP" >> "$ENTRY"
          printf "> Period: \`%s\` → \`%s\`\n\n" "$SIX_HOURS_AGO" "$NOW" >> "$ENTRY"
          printf "| Repository | Commits |\n" >> "$ENTRY"
          printf "| --- | --- |\n" >> "$ENTRY"

          TOTAL=0
          DETAILS=$(mktemp)

          for REPO in $REPOS; do
            COMMIT_LINES=$(gh api --paginate \
              "repos/${REPO}/commits?since=${SIX_HOURS_AGO}&until=${NOW}" \
              --jq '.[] | "- [`" + .sha[0:7] + "`] " + (.commit.message | split("\n")[0]) + " — " + .commit.author.name' \
              2>/dev/null || true)

            COUNT=0
            if [ -n "$COMMIT_LINES" ]; then
              COUNT=$(printf "%s\n" "$COMMIT_LINES" | wc -l)
            fi
            TOTAL=$((TOTAL + COUNT))

            printf "| \`%s\` | **%s** |\n" "$REPO" "$COUNT" >> "$ENTRY"

            # Collect per-repo detail block
            printf "\n### \`%s\` — %s commit(s)\n\n" "$REPO" "$COUNT" >> "$DETAILS"
            if [ -n "$COMMIT_LINES" ]; then
              printf "%s\n" "$COMMIT_LINES" >> "$DETAILS"
            else
              printf "_No commits in this period._\n" >> "$DETAILS"
            fi
          done

          printf "\n**Total: %s commit(s)**\n" "$TOTAL" >> "$ENTRY"
          cat "$DETAILS" >> "$ENTRY"
          printf "\n---\n\n" >> "$ENTRY"
          rm "$DETAILS"

          # Prepend entry into log file (newest first)
          if [ -f "$REPORT" ]; then
            TMP=$(mktemp)
            printf "# Commit Activity Log\n\n" > "$TMP"
            cat "$ENTRY" >> "$TMP"
            tail -n +3 "$REPORT" >> "$TMP"   # skip existing header (first 2 lines)
            mv "$TMP" "$REPORT"
          else
            printf "# Commit Activity Log\n\n" > "$REPORT"
            cat "$ENTRY" >> "$REPORT"
          fi

          rm "$ENTRY"

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "chore: commit tracker $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push origin HEAD
          fi
