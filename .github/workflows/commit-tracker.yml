name: Commit Tracker

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual trigger from the Actions tab

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 scripts/check-commits.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/commit-log.md
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: commit tracker report $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push
        run: git push
