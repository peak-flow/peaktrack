name: Commit Activity Tracker

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 */6 * * *"
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit commit-log.md back to the repo

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ORG: peak-flow
          LOOKBACK_HOURS: "6"
          LOG_FILE: commit-log.md
        run: python scripts/track_commits.py

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes to commit." || \
            git commit -m "chore: update commit activity log [skip ci]"
          git push
