name: Commit Tracker (Every 6 Hours)

on:
  schedule:
    - cron: '0 */6 * * *'   # runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run commit tracker
        env:
          # Use GH_PAT (Personal Access Token) for cross-repo access.
          # If not set, falls back to GITHUB_TOKEN (current repo only).
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/track_commits.py

      - name: Commit and push updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMMIT_LOG.md
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update commit log [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
