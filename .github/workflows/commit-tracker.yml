name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits and update log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: peak-flow/peaktrack
        run: python3 .github/scripts/track_commits.py

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit_log.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: commit activity log $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
