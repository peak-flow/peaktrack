name: Commit Activity Tracker

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 */6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to commit the updated markdown back

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/track_commits.sh
          bash scripts/track_commits.sh peak-flow commit-tracker.md

      - name: Commit and push updated tracker
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-tracker.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update commit tracker $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
