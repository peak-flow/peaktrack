name: Commit Tracker (every 6 hours)

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit the report back to the repo

jobs:
  track-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run commit tracker
        env:
          # GH_PAT gives access to ALL your repos (owner, collaborator, org member).
          # Create a fine-grained PAT with "Contents: Read" across all repos and
          # add it as a repository secret named GH_PAT.
          # If GH_PAT is not set, falls back to GITHUB_TOKEN (current repo only).
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/track_commits.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/
          # Only commit if there are actual changes
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: commit report for $TIMESTAMP"
          git push origin HEAD
