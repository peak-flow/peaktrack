name: Commit Activity Tracker

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # Allow manual trigger from the Actions tab

jobs:
  track-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master         # Always update the report on the default branch
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run commit tracker
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/track_commits.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-report.md
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update commit activity report $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi
