name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count commits in last 6 hours
        env:
          # Use GH_PAT secret for org-wide access, falls back to GITHUB_TOKEN (current repo only)
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ORG: peak-flow
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          TOKEN = os.environ['GH_TOKEN']
          ORG   = os.environ['ORG']

          def gh_get(path):
              url = f"https://api.github.com{path}"
              req = urllib.request.Request(url, headers={
                  'Authorization': f'token {TOKEN}',
                  'Accept': 'application/vnd.github.v3+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              })
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code} for {path}")
                  return []

          now   = datetime.now(timezone.utc)
          since = (now - timedelta(hours=6)).strftime('%Y-%m-%dT%H:%M:%SZ')
          label = now.strftime('%Y-%m-%d %H:%M UTC')

          print(f"Checking commits since {since} ...")

          repos = gh_get(f'/orgs/{ORG}/repos?per_page=100&type=all')
          if not isinstance(repos, list):
              repos = []
          print(f"Found {len(repos)} repos in {ORG}")

          results, total = {}, 0
          for repo in sorted(repos, key=lambda r: r['name']):
              name = repo['name']
              commits = gh_get(f'/repos/{ORG}/{name}/commits?since={since}&per_page=100')
              if isinstance(commits, list) and commits:
                  count = len(commits)
                  results[name] = count
                  total += count
                  print(f"  {name}: {count} commit(s)")

          # Build markdown entry (newest first)
          entry_lines = [f'## {label}', '']
          if results:
              for repo_name, count in sorted(results.items(), key=lambda x: -x[1]):
                  s = 's' if count != 1 else ''
                  entry_lines.append(f'- **{repo_name}**: {count} commit{s}')
              repo_s   = 's' if len(results) != 1 else ''
              commit_s = 's' if total != 1 else ''
              entry_lines += [
                  '',
                  f'**Total: {total} commit{commit_s} across {len(results)} active repo{repo_s}**',
              ]
          else:
              entry_lines.append('_No commits in this period._')
          entry_lines += ['', '---', '']
          new_block = '\n'.join(entry_lines) + '\n'

          log = 'commit-log.md'
          header = (
              '# Commit Activity Log\n\n'
              f'_Auto-updated every 6 hours. '
              f'Tracking [{ORG}](https://github.com/{ORG}) repos._\n\n'
              '---\n\n'
          )

          if os.path.exists(log):
              content = open(log).read()
              # Insert new entry before the previous first entry (prepend after header)
              if '## ' in content:
                  idx = content.index('## ')
                  content = content[:idx] + new_block + content[idx:]
              else:
                  content = content.rstrip('\n') + '\n\n' + new_block
          else:
              content = header + new_block

          with open(log, 'w') as f:
              f.write(content)

          print(f"\nLogged {total} commits across {len(results)} repos to {log}")
          PYEOF

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: commit log $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
