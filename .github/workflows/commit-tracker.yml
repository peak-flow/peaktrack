name: Commit Activity Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC every day
  workflow_dispatch:          # allow manual run from the Actions tab

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push the updated report file

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers downstream workflows if needed.
          # Fall back to GITHUB_TOKEN if no PAT is configured.
          token: ${{ secrets.COMMIT_TRACKER_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        env:
          # COMMIT_TRACKER_PAT must have `repo` scope (or `public_repo` for
          # public-only access) to read commits from all peak-flow repos.
          # Add it at: Settings → Secrets and variables → Actions → New secret
          GH_TOKEN: ${{ secrets.COMMIT_TRACKER_PAT || secrets.GITHUB_TOKEN }}
        run: python scripts/track_commits.py

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-reports/COMMIT_LOG.md
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: commit activity report $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push -u origin HEAD
