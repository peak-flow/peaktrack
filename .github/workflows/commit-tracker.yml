name: Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/kind-pascal-NRK86
          token: ${{ secrets.GH_PAT }}

      - name: Count commits in last 6 hours and update tracker
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, datetime, os, sys

          token  = os.environ["GH_TOKEN"]
          since  = (datetime.datetime.utcnow() - datetime.timedelta(hours=6)).strftime("%Y-%m-%dT%H:%M:%SZ")
          now_str = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.cloak-preview+json",
              "User-Agent": "peaktrack-commit-tracker/1.0",
          }

          commits_by_repo: dict[str, int] = {}
          page = 1
          while True:
              q   = urllib.parse.quote(f"org:peak-flow committer-date:>={since}")
              url = f"https://api.github.com/search/commits?q={q}&per_page=100&page={page}&sort=committer-date&order=desc"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"GitHub API error {e.code}: {e.read().decode()}", file=sys.stderr)
                  sys.exit(1)

              items = data.get("items", [])
              for item in items:
                  repo = item["repository"]["full_name"]
                  commits_by_repo[repo] = commits_by_repo.get(repo, 0) + 1

              if len(items) < 100:
                  break
              page += 1

          total = sum(commits_by_repo.values())

          # Build the markdown entry
          lines = [f"\n## {now_str}\n"]
          lines.append(f"**Window:** last 6 hours | **Total commits:** {total}\n")
          if total > 0:
              lines.append("\n| Repository | Commits |")
              lines.append("|---|---|")
              for repo, count in sorted(commits_by_repo.items(), key=lambda x: -x[1]):
                  lines.append(f"| {repo} | {count} |")
          else:
              lines.append("\n_(No commits in this window.)_")
          lines.append("\n---\n")

          entry = "\n".join(lines)

          # Insert after the start marker
          marker = "<!-- TRACKER_ENTRIES_START -->"
          with open("commit-tracker.md", "r") as f:
              content = f.read()

          if marker not in content:
              print("Marker not found in commit-tracker.md", file=sys.stderr)
              sys.exit(1)

          new_content = content.replace(marker, marker + entry, 1)
          with open("commit-tracker.md", "w") as f:
              f.write(new_content)

          print(f"Logged {total} commits across {len(commits_by_repo)} repos for window ending {now_str}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          git add commit-tracker.md
          git diff --staged --quiet || git commit -m "tracker: 6h snapshot ${TIMESTAMP}"
          git push origin claude/kind-pascal-NRK86
