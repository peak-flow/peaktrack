name: Commit Tracker

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write             # needed to commit commit-log.md back

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Authentication note:
      #   GITHUB_TOKEN can only read THIS repo. To query all peak-flow
      #   repos you need a Personal Access Token (classic) with the
      #   `repo` scope saved as a repository secret named ORG_PAT.
      #   Create one at: GitHub → Settings → Developer Settings → PATs
      #   Then add it: this repo → Settings → Secrets → ORG_PAT
      # ---------------------------------------------------------------
      - name: Check commits across peak-flow org
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT || secrets.GITHUB_TOKEN }}
          ORG: peak-flow
          HOURS: 6
          LOG_FILE: commit-log.md
        run: bash scripts/check-commits.sh

      - name: Commit and push updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: commit log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
