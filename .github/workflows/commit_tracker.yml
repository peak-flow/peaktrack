name: GitHub Commit Tracker (6h)

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC every day
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  track-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.COMMIT_TRACKER_TOKEN }}
        run: python3 scripts/github_commit_tracker.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit_log.md
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update commit log $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
