name: Commit Tracker

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write   # needed to commit commit_log.md back to the repo

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch the branch we'll commit back to
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run commit tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To monitor additional repos, add a repo secret called REPOS_TOKEN
          # (a PAT with repo read access) and set REPOS below:
          #
          # GITHUB_TOKEN: ${{ secrets.REPOS_TOKEN }}
          # REPOS: "owner/repo1,owner/repo2,owner/repo3"
          REPOS: "peak-flow/peaktrack"
          HOURS: "6"
          LOG_FILE: "commit_log.md"
        run: python scripts/check_commits.py

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit_log.md
          # Only commit if the file actually changed
          git diff --cached --quiet || \
            git commit -m "chore: update commit log [skip ci]"
          git push
