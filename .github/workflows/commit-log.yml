name: Commit Activity Log

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count commits in last 6 hours and update log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          # Count commits via GitHub API
          COMMIT_COUNT=$(gh api \
            "repos/${REPO}/commits?since=${SINCE}&per_page=100" \
            --paginate \
            --jq '. | length' | \
            awk '{s+=$1} END {print s}')

          # Default to 0 if empty
          COMMIT_COUNT=${COMMIT_COUNT:-0}

          LOG_FILE="commit-log.md"

          # Create file with header if it doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            cat > "$LOG_FILE" <<'HEADER'
          # GitHub Commit Activity Log

          Automatically updated every 6 hours by GitHub Actions.

          | Timestamp (UTC) | Repository | Commits in Last 6h |
          |-----------------|------------|-------------------|
          HEADER
          fi

          # Append new row
          echo "| ${TIMESTAMP} | ${REPO} | ${COMMIT_COUNT} |" >> "$LOG_FILE"

          echo "Logged: ${COMMIT_COUNT} commits since ${SINCE}"

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          git diff --cached --quiet || git commit -m "chore: update commit activity log [skip ci]"
          git push
