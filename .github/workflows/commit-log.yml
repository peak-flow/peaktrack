name: Commit Activity Log

on:
  schedule:
    - cron: '0 */6 * * *'   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  log-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count and log commits from last 6 hours
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS=("peak-flow/peaktrack")
          SINCE=$(date -u -d '6 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          DISPLAY_NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          LOG_FILE="commit-log.md"

          # Create file with header if it doesn't exist
          if [ ! -f "$LOG_FILE" ]; then
            echo "# GitHub Commit Log" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
          fi

          TOTAL=0
          TABLE_ROWS=""
          DETAIL_SECTIONS=""

          for FULL_REPO in "${REPOS[@]}"; do
            OWNER="${FULL_REPO%%/*}"
            REPO="${FULL_REPO##*/}"

            JSON=$(gh api "repos/${OWNER}/${REPO}/commits?since=${SINCE}&per_page=100" || echo "[]")
            COUNT=$(echo "$JSON" | jq 'length')
            TOTAL=$((TOTAL + COUNT))
            TABLE_ROWS+="| ${FULL_REPO} | ${COUNT} |\n"

            if [ "$COUNT" -gt 0 ]; then
              DETAIL_SECTIONS+="\n### ${FULL_REPO}\n"
              LINES=$(echo "$JSON" | jq -r '
                .[:20][] |
                "- `" + (.sha[0:7]) + "` **" + (.commit.author.name) + "** — " +
                (.commit.message | split("\n")[0]) +
                " *(" + (.commit.author.date[0:10]) + ")*"
              ')
              DETAIL_SECTIONS+="${LINES}\n"
              REMAINING=$((COUNT - 20))
              if [ "$REMAINING" -gt 0 ]; then
                DETAIL_SECTIONS+="- …and ${REMAINING} more\n"
              fi
            fi
          done

          # Build and append the entry
          {
            printf "## %s — %d commits in last 6 hours\n\n" "$DISPLAY_NOW" "$TOTAL"
            printf "| Repo | Commits |\n|------|---------|\n"
            printf "%b" "$TABLE_ROWS"
            if [ -n "$DETAIL_SECTIONS" ]; then
              printf "%b" "$DETAIL_SECTIONS"
            else
              printf "\n*No commits in this window.*\n"
            fi
            printf "\n---\n"
          } >> "$LOG_FILE"

          echo "Appended entry for $DISPLAY_NOW (total commits: $TOTAL)"

      - name: Commit updated log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.md
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: commit log update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
