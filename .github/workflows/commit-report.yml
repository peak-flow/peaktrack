name: Commit Activity Report

on:
  schedule:
    - cron: '0 */6 * * *'  # 00:00, 06:00, 12:00, 18:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch commits from last 6 hours and update report
        env:
          # For private repos across the org, add a PAT (repo scope) as secret COMMIT_REPORT_TOKEN.
          # Falls back to GITHUB_TOKEN which only covers public repos.
          GH_TOKEN: ${{ secrets.COMMIT_REPORT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          NOW=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          TODAY=$(date -u '+%Y-%m-%d')

          echo "Searching commits since $SINCE ..."

          RESPONSE=$(gh api \
            -H "Accept: application/vnd.github.cloak-preview+json" \
            "search/commits?q=org:peak-flow+committer-date:>=${SINCE}&sort=committer-date&order=desc&per_page=100")

          TOTAL=$(echo "$RESPONSE" | jq '.total_count')
          ITEMS=$(echo "$RESPONSE" | jq '.items')

          # Fetch page 2 if there are more than 100 commits
          if [ "$TOTAL" -gt 100 ]; then
            PAGE2=$(gh api \
              -H "Accept: application/vnd.github.cloak-preview+json" \
              "search/commits?q=org:peak-flow+committer-date:>=${SINCE}&sort=committer-date&order=desc&per_page=100&page=2")
            ITEMS=$(printf '%s\n%s' "$ITEMS" "$(echo "$PAGE2" | jq '.items')" | jq -s 'add')
          fi

          {
            echo ""
            echo "## $TODAY · window \`$SINCE\` → \`$NOW\`"
            echo ""
            echo "**Total commits:** $TOTAL"
            echo ""

            if [ "$TOTAL" -eq "0" ]; then
              echo "No commits this window."
            else
              echo "| Repository | Commits | Latest message |"
              echo "|---|---|---|"
              echo "$ITEMS" | jq -r '
                group_by(.repository.full_name)
                | map({
                    repo: .[0].repository.full_name,
                    count: length,
                    msg: (.[0].commit.message | split("\n")[0] | .[0:80])
                  })
                | sort_by(-.count)[]
                | "| \(.repo) | \(.count) | \(.msg) |"
              '
            fi

            echo ""
            echo "---"
          } >> commit-report.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-report.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: commit report $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
