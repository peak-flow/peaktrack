name: Commit Activity Check

on:
  schedule:
    # Every 6 hours at :00
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  log-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch commits from last 6 hours and update log
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Timestamp: 6 hours ago in ISO 8601
          SINCE=$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          CHECK_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          echo "Searching commits since $SINCE ..."

          # GitHub Search API: commits in org:peak-flow after SINCE
          # Paginate up to 3 pages (300 commits max)
          ALL_ITEMS="[]"
          for PAGE in 1 2 3; do
            RESPONSE=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/search/commits?q=org:peak-flow+committer-date:%3E${SINCE}&sort=committer-date&order=desc&per_page=100&page=${PAGE}")
            ITEMS=$(echo "$RESPONSE" | jq '.items // []')
            COUNT=$(echo "$ITEMS" | jq 'length')
            ALL_ITEMS=$(echo "$ALL_ITEMS $ITEMS" | jq -s 'add')
            if [ "$COUNT" -lt 100 ]; then break; fi
          done

          TOTAL=$(echo "$ALL_ITEMS" | jq 'length')
          echo "Found $TOTAL commits"

          # Build markdown table rows grouped by repo
          TABLE_ROWS=""
          if [ "$TOTAL" -gt 0 ]; then
            TABLE_ROWS=$(echo "$ALL_ITEMS" | jq -r '
              group_by(.repository.full_name)
              | sort_by(-length)
              | .[]
              | "| \(.[0].repository.full_name) | \(length) | \(.[0].commit.message | split("\n")[0] | .[0:80]) |"
            ')
          fi

          # Build the new log entry
          if [ "$TOTAL" -eq 0 ]; then
            ENTRY="## Check: ${CHECK_TIME}\n**Total commits:** 0\n\n_(no activity)_\n\n---"
          else
            HEADER="## Check: ${CHECK_TIME}\n**Total commits:** ${TOTAL}  \n**Repos with activity:**\n\n| Repo | Commits | Latest Message |\n|------|---------|----------------|"
            ENTRY="${HEADER}\n${TABLE_ROWS}\n\n---"
          fi

          # Ensure log file exists with heading
          LOG_FILE="commit-activity-log.md"
          if [ ! -f "$LOG_FILE" ]; then
            echo "# Peak-Flow Commit Activity Log" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "Automatically updated every 6 hours via GitHub Actions." >> "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "---" >> "$LOG_FILE"
            echo "" >> "$LOG_FILE"
          fi

          # Append new entry after the header block (after first ---)
          TMP=$(mktemp)
          awk '/^---$/{found++} found==1{print; print ""; printf "%s\n", entry; found=2; next} {print}' \
            entry="$(printf '%b' "$ENTRY")" "$LOG_FILE" > "$TMP" && mv "$TMP" "$LOG_FILE"

      - name: Commit and push log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-activity-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update commit activity log [skip ci]"
            git push
          fi
